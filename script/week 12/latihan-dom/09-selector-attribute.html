<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09 - Selector Attribute</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Latihan 9: Selector Attribute</h1>
    <p>Buka Console (F12) untuk melihat hasil</p>
    
    <div class="arif">Arif</div>
    <div class="wicaksono">Wicaksono</div>
    <div class="septyanto">Septyanto</div>
    
    <script>
        // Selector Attribute mencari element yang memiliki attribute tertentu
        // Format: document.querySelectorAll("[namaAttribute]")
        
        console.log('=== SELECTOR ATTRIBUTE ===');
        
        // Mencari semua element yang punya attribute "class"
        const list = document.querySelectorAll("[class]");
        
        console.log('Semua element dengan attribute class:', list);
        console.log('Jumlah:', list.length);
        
        // Loop menampilkan class dan isi
        list.forEach((div, index) => {
            console.log(`Div ${index + 1} - class: "${div.className}", text: "${div.textContent}"`);
        });
        
        // Selector ini berguna untuk mencari element berdasarkan keberadaan attribute
    </script>
</body>
</html>
